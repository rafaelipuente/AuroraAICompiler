name: AuroraAICompiler CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install LLVM 17 + MLIR from apt.llvm.org
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main"
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build python3 python3-pip \
          clang-17 llvm-17-dev libmlir-17-dev mlir-17-tools \
          libclang-17-dev lld-17

    - name: Install lit
      run: pip3 install lit

    - name: Configure
      run: |
        mkdir -p build && cd build
        cmake -G Ninja \
          -DCMAKE_C_COMPILER=clang-17 \
          -DCMAKE_CXX_COMPILER=clang++-17 \
          -DMLIR_DIR=/usr/lib/llvm-17/lib/cmake/mlir \
          -DLLVM_DIR=/usr/lib/llvm-17/lib/cmake/llvm \
          -DLLVM_EXTERNAL_LIT=$(which lit) \
          ..

    - name: Build
      run: ninja -C build -j$(nproc)

    - name: Run lit tests
      run: ninja -C build check-aurora

    - name: Verify aurora-opt loads
      run: build/bin/aurora-opt --help > /dev/null

    - name: Verify wrapper script (help + emit-llvm-dialect)
      run: |
        chmod +x scripts/aurora-to-obj.sh
        scripts/aurora-to-obj.sh --help
        # Smoke test: run the wrapper through the LLVM dialect stage only.
        # This validates aurora-opt integration without needing mlir-translate.
        scripts/aurora-to-obj.sh \
          --aurora-opt build/bin/aurora-opt \
          --emit-llvm-dialect \
          -o /tmp/aurora-test-output.llvm.mlir \
          examples/pipeline_to_llvm.mlir
        # Verify the output contains LLVM dialect ops and no Aurora ops.
        grep -q "llvm.func" /tmp/aurora-test-output.llvm.mlir
        ! grep -q "aurora\." /tmp/aurora-test-output.llvm.mlir
